<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Sem K.O · Relo · Xepa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Carregando agenda...</div>
</div>

<div class="bg-wallpaper">
  <img src="./img/logo.jpeg" alt="">
</div>

<header>
  <div class="header-inner">
    <img class="logo-img" src="./img/logo.jpeg" alt="Logo">
    <div class="header-info">
      <div class="header-name">Sem K.O &middot; Relo &middot; Xepa</div>
      <div class="header-sub">Agenda Oficial de Eventos</div>
      <div class="header-accent-line"></div>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-btn ativo" onclick="trocarView('eventos',this)">Eventos</button>
    <button class="nav-btn" onclick="trocarView('calendario',this)">Calendário</button>
  </div>
</nav>

<main>
  <div id="view-eventos" class="view ativo">
    <div class="page-header">
      <div class="page-title">Próximos Eventos <span></span></div>
      <button class="btn btn-add" id="btn-novo" onclick="abrirModal()">+ Novo Evento</button>
    </div>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
      <button class="cal-nav" onclick="mudaMesEventos(-1)" style="flex-shrink: 0;">&#8249;</button>
      <div id="eventos-mes-label" style="font-size: 0.88rem; font-weight: 600; letter-spacing: 1px; color: var(--text); min-width: 180px; text-align: center;">—</div>
      <button class="cal-nav" onclick="mudaMesEventos(1)" style="flex-shrink: 0;">&#8250;</button>
    </div>
    <div class="grid" id="grid-eventos"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-title">Nenhum evento neste mês</div>
      <div class="empty-sub">Navegue entre os meses ou crie um novo evento</div>
    </div>
  </div>

  <div id="view-calendario" class="view">
    <div class="page-header">
      <div class="page-title">Calendário <span></span></div>
    </div>
    <div class="cal-box">
      <div class="cal-head">
        <button class="cal-nav" onclick="mudaMes(-1)">&#8249;</button>
        <div class="cal-mes-label" id="cal-label">—</div>
        <button class="cal-nav" onclick="mudaMes(1)">&#8250;</button>
      </div>
      <div class="cal-body">
        <div class="cal-weekdays">
          <div class="cal-wd">Dom</div><div class="cal-wd">Seg</div><div class="cal-wd">Ter</div>
          <div class="cal-wd">Qua</div><div class="cal-wd">Qui</div><div class="cal-wd">Sex</div><div class="cal-wd">Sáb</div>
        </div>
        <div class="cal-cells" id="cal-cells"></div>
      </div>
    </div>
    <div class="cal-events-section" id="cal-lista"></div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div>
        <div class="modal-label">Sem K.O &middot; Relo &middot; Xepa</div>
        <div class="modal-title" id="modal-titulo">Novo Evento</div>
      </div>
      <button class="modal-close" onclick="fechar()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Nome do Evento</label>
        <input id="f-nome" type="text" placeholder="Ex: Torneio de Pipa — Zona Norte">
      </div>
      <div class="form-row">
        <div class="fg"><label>Data</label><input id="f-data" type="date"></div>
        <div class="fg"><label>Horário</label><input id="f-hora" type="time"></div>
      </div>
      <div class="fg">
        <label>Local</label>
        <input id="f-local" type="text" placeholder="Endereço ou nome do local">
      </div>
      <div class="fg">
        <label>Descrição</label>
        <textarea id="f-desc" placeholder="Informações, regras, detalhes do evento..."></textarea>
      </div>
      <div class="fg">
        <label>Foto do Flyer</label>
        <div class="upload-zone">
          <input type="file" accept="image/*" id="f-flyer" onchange="selecionarFlyer(event)">
          <div id="upload-placeholder">
            <div class="upload-zone-text">Clique ou arraste o flyer aqui</div>
            <div class="upload-hint">JPG &middot; PNG &middot; GIF</div>
          </div>
          <img id="f-preview" class="preview-img" alt="">
          <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-bar"><div class="upload-progress-fill" id="progress-fill"></div></div>
            <div class="upload-progress-txt" id="progress-txt">Enviando...</div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="fechar()">Cancelar</button>
      <button class="btn btn-add" id="btn-salvar" onclick="salvar()">Salvar Evento</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
